<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Test Cats Alignment</title>
    <style>
        body {
            background-color: #f4ede4;
            font-family: sans-serif;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }
        .piece-box {
            border: 2px dashed #999;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
        }
        .piece-title {
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }
        .grid-container {
            position: relative;
            background: #eee;
        }
        .block {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 16px;
            box-sizing: border-box;
            border: 4px solid #fff;
        }
        .cat-image {
            position: absolute;
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>Cat Alignment Test</h1>
    <div class="container">
        <!-- orangeSolo -->
        <div class="piece-box">
            <div class="piece-title">orangeSolo (1x1)</div>
            <div class="grid-container" style="width: 100px; height: 100px;">
                <div class="block" style="left: 0px; top: 0px; background-color: #ffaa44;"></div>
                <img class="cat-image" src="assets/cats/orangeSolo.png" style="width: 103px; height: 125.5px; left: -1.5px; top: -12.75px;">
            </div>
        </div>

        <!-- creamCurl -->
        <div class="piece-box">
            <div class="piece-title">creamCurl (L-tromino)</div>
            <div class="grid-container" style="width: 200px; height: 200px;">
                <div class="block" style="left: 0px; top: 0px; background-color: #ffeebb;"></div>
                <div class="block" style="left: 0px; top: 100px; background-color: #ffeebb;"></div>
                <div class="block" style="left: 100px; top: 100px; background-color: #ffeebb;"></div>
                <img class="cat-image" src="assets/cats/creamCurl.png" style="width: 156.5px; height: 184.5px; left: 0px; top: 0px;">
            </div>
        </div>

        <!-- graySit -->
        <div class="piece-box">
            <div class="piece-title">graySit (L-tetromino)</div>
            <div class="grid-container" style="width: 200px; height: 300px;">
                <div class="block" style="left: 0px; top: 0px; background-color: #9999a0;"></div>
                <div class="block" style="left: 0px; top: 100px; background-color: #9999a0;"></div>
                <div class="block" style="left: 0px; top: 200px; background-color: #9999a0;"></div>
                <div class="block" style="left: 100px; top: 200px; background-color: #9999a0;"></div>
                <img class="cat-image" src="assets/cats/graySit.png" style="width: 175.5px; height: 266.5px; left: 0px; top: 0px;">
            </div>
        </div>

        <!-- calicoStretch -->
        <div class="piece-box">
            <div class="piece-title">calicoStretch (S/Z-tetromino)</div>
            <div class="grid-container" style="width: 300px; height: 200px;">
                <div class="block" style="left: 0px; top: 0px; background-color: #e88a5d;"></div>
                <div class="block" style="left: 100px; top: 0px; background-color: #e88a5d;"></div>
                <div class="block" style="left: 100px; top: 100px; background-color: #e88a5d;"></div>
                <div class="block" style="left: 200px; top: 100px; background-color: #e88a5d;"></div>
                <img class="cat-image" src="assets/cats/calicoStretch.png" style="width: 201.5px; height: 239px; left: 0px; top: 0px;">
            </div>
        </div>

        <!-- blackLong -->
        <div class="piece-box">
            <div class="piece-title">blackLong (I-tetromino)</div>
            <div class="grid-container" style="width: 100px; height: 400px;">
                <div class="block" style="left: 0px; top: 0px; background-color: #444444;"></div>
                <div class="block" style="left: 0px; top: 100px; background-color: #444444;"></div>
                <div class="block" style="left: 0px; top: 200px; background-color: #444444;"></div>
                <div class="block" style="left: 0px; top: 300px; background-color: #444444;"></div>
                <img class="cat-image" src="assets/cats/blackLong.png" style="width: 102px; height: 303.5px; left: 0px; top: 0px;">
            </div>
        </div>
    </div>
</body>
</html>
